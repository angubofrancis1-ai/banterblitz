<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BanterBlitz ⚽️</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Impact&display=swap');
    
    body {
      margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a0a0a, #1a0033);
      color: white; text-align: center;
    }
    header {
      background: linear-gradient(to right, #00ff88, #00cc66);
      color: black; padding: 25px 20px; 
      border-bottom: 6px solid #ff00aa;
    }
    h1 { margin: 0; font-size: 3rem; text-shadow: 3px 3px 0 #000; }
    .subtitle { font-size: 1.3rem; margin-top: 5px; font-weight: bold; }

    .container {
      max-width: 1200px; margin: 30px auto; 
      display: flex; flex-wrap: wrap; gap: 30px; justify-content: center;
    }
    .editor {
      background: #1e0033; padding: 25px; border-radius: 20px;
      width: 480px; box-shadow: 0 15px 40px rgba(0, 255, 136, 0.15);
    }
    canvas {
      border: 5px solid #00ff88; border-radius: 16px; background: #000;
      box-shadow: 0 10px 30px rgba(255,0,170,0.3);
    }
    input, select, button {
      width: 100%; padding: 14px; margin: 12px 0; border-radius: 10px; border: none;
      font-size: 1.1rem;
    }
    input { background: #2a004d; color: white; }
    button {
      background: #00ff88; color: black; font-weight: bold; cursor: pointer;
      transition: all 0.2s;
    }
    button:hover { background: #00e67a; transform: scale(1.05); }

    .templates {
      display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin: 15px 0;
    }
    .template {
      width: 90px; height: 90px; border: 3px solid #440066; border-radius: 12px;
      background-size: cover; background-position: center; cursor: pointer;
    }
    .template:hover { border-color: #00ff88; transform: scale(1.1); }
  </style>
</head>
<body>
  <header>
    <h1>BanterBlitz</h1>
    <p class="subtitle">⚽️ Roast Your Rivals • Create Chaos</p>
  </header>

  <div class="container">
    <div class="editor">
      <h2>🎨 Meme Studio</h2>
      
      <div class="templates">
        <div class="template" style="background-image:url('https://picsum.photos/id/1015/600/600')" onclick="loadTemplate(0)"></div>
        <div class="template" style="background-image:url('https://picsum.photos/id/201/600/600')" onclick="loadTemplate(1)"></div>
        <div class="template" style="background-image:url('https://picsum.photos/id/301/600/600')" onclick="loadTemplate(2)"></div>
        <div class="template" style="background-image:url('https://picsum.photos/id/870/600/600')" onclick="loadTemplate(3)"></div>
      </div>

      <input type="text" id="top-text" placeholder="TOP TEXT (e.g. WHEN YOUR RIVAL WINS IN 90+6)" oninput="drawMeme()">
      <input type="text" id="bottom-text" placeholder="BOTTOM TEXT (e.g. PAIN.)" oninput="drawMeme()">
      
      <select id="font-size" onchange="drawMeme()">
        <option value="48">Huge Font</option>
        <option value="38" selected>Big Font</option>
        <option value="28">Normal Font</option>
      </select>

      <button onclick="downloadMeme()">⬇️ DOWNLOAD MEME</button>
      <button onclick="randomBanter()">🎲 Random Savage Prompt</button>
    </div>

    <div>
      <canvas id="meme-canvas" width="500" height="500"></canvas>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('meme-canvas');
    const ctx = canvas.getContext('2d');
    let currentImage = new Image();

    const templateUrls = [
      'https://picsum.photos/id/1015/600/600',
      'https://picsum.photos/id/201/600/600',
      'https://picsum.photos/id/301/600/600',
      'https://picsum.photos/id/870/600/600'
    ];

    function loadTemplate(index) {
      currentImage.src = templateUrls[index];
      currentImage.onload = drawMeme;
    }

    function drawMeme() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      if (currentImage.src) {
        ctx.drawImage(currentImage, 0, 0, canvas.width, canvas.height);
      } else {
        ctx.fillStyle = '#111';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      const top = document.getElementById('top-text').value.toUpperCase();
      const bottom = document.getElementById('bottom-text').value.toUpperCase();
      const size = document.getElementById('font-size').value;

      ctx.font = `bold ${size}px Impact`;
      ctx.fillStyle = 'white';
      ctx.strokeStyle = 'black';
      ctx.lineWidth = 8;
      ctx.textAlign = 'center';
      ctx.shadowColor = 'black';
      ctx.shadowBlur = 10;

      ctx.strokeText(top, 250, 80);
      ctx.fillText(top, 250, 80);

      ctx.strokeText(bottom, 250, 450);
      ctx.fillText(bottom, 250, 450);
    }

    function downloadMeme() {
      const link = document.createElement('a');
      link.download = `banterblitz-${Date.now()}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    function randomBanter() {
      const tops = ["VAR DECISION", "YOUR RIVAL IN 90+8", "HAALAND THIS SEASON", "MY TEAM AFTER 3 GAMES", "WHEN THEY SCORE FIRST"];
      const bottoms = ["WE DONT TALK ABOUT IT", "STILL CELEBRATING", "PLOT ARMOUR", "PAIN.", "CRYING IN THE CLUB"];
      
      document.getElementById('top-text').value = tops[Math.floor(Math.random()*tops.length)];
      document.getElementById('bottom-text').value = bottoms[Math.floor(Math.random()*bottoms.length)];
      drawMeme();
    }

    loadTemplate(0);
  </script>
</body>
        </html>
